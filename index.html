
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { padding: 1.5rem 0; max-width: 640px; font-family: var(--font-sans); }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .header p { font-size: 14px; color: var(--color-text-secondary); }
  .search-row { display: flex; gap: 8px; margin-bottom: 0.5rem; }
  .search-row input { flex: 1; }
  .search-row button { white-space: nowrap; padding: 0 16px; }
  .hint { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 1.5rem; }
  .hint strong { color: var(--color-text-secondary); font-weight: 500; }

  .results { display: flex; flex-direction: column; gap: 10px; }

  .site-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .site-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .site-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; }
  .site-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; background: var(--color-background-success); color: var(--color-text-success); }
  .site-badge.warn { background: var(--color-background-warning); color: var(--color-text-warning); }
  .site-desc { font-size: 12px; color: var(--color-text-secondary); padding: 0.75rem 1.1rem; line-height: 1.5; }
  .site-footer { padding: 0.75rem 1.1rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .open-btn { font-size: 13px; padding: 6px 14px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); text-decoration: none; display: inline-block; }
  .open-btn:hover { background: var(--color-background-secondary); }
  .open-btn.primary { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }

  .tip-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.85rem 1rem; font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-top: 0.5rem; }
  .tip-box strong { color: var(--color-text-primary); font-weight: 500; }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--color-text-secondary); font-size: 14px; }
  .empty-icon { font-size: 32px; margin-bottom: 0.75rem; }
</style>

<div class="wrap">
  <div class="header">
    <h1>Funko Pop price checker</h1>
    <p>Enter a name or Pop number — we'll open the best price sources for you</p>
  </div>

  <div class="search-row">
    <input type="text" id="query" placeholder='e.g. "Batman #01" or "Darth Vader 157"' />
    <button onclick="doSearch()">Check price</button>
  </div>
  <p class="hint"><strong>Tip:</strong> Include the Pop number from the box corner for the most accurate results</p>

  <div id="results">
    <div class="empty">
      <div class="empty-icon">&#9679;</div>
      <div>Search for a Funko to see where to check its value</div>
    </div>
  </div>
</div>

<script>
function enc(s) { return encodeURIComponent(s + ' funko pop'); }
function encPPG(s) { return encodeURIComponent(s); }

function doSearch() {
  const raw = document.getElementById('query').value.trim();
  if (!raw) return;

  const q = raw;
  const out = document.getElementById('results');

  const ebayUrl = 'https://www.ebay.co.uk/sch/i.html?_nkw=' + enc(q) + '&LH_Sold=1&LH_Complete=1&_sop=13';
  const ebayActiveUrl = 'https://www.ebay.co.uk/sch/i.html?_nkw=' + enc(q) + '&_sop=15';
  const ppgUrl = 'https://www.poppriceguide.com/?q=' + encPPG(q);
  const priceChartUrl = 'https://www.pricecharting.com/search-products?q=' + encPPG(q) + '+funko&type=prices';
  const whatnotUrl = 'https://www.whatnot.com/search?query=' + enc(q);

  out.innerHTML = `
    <div class="results">

      <div class="site-card">
        <div class="site-header">
          <span class="site-name">eBay sold listings <span class="site-badge">Most accurate</span></span>
        </div>
        <div class="site-desc">Shows what people have <strong>actually paid</strong> recently — filtered to sold & completed listings, newest first. This is the most reliable real-world price signal.</div>
        <div class="site-footer">
          <a class="open-btn primary" href="${ebayUrl}" target="_blank">View sold listings ↗</a>
          <a class="open-btn" href="${ebayActiveUrl}" target="_blank">See active listings ↗</a>
        </div>
      </div>

      <div class="site-card">
        <div class="site-header">
          <span class="site-name">Pop Price Guide (hobbyDB) <span class="site-badge">Best database</span></span>
        </div>
        <div class="site-desc">The largest Funko price database. Shows estimated value, price history charts, and whether the Pop is vaulted or exclusive — useful for spotting trends.</div>
        <div class="site-footer">
          <a class="open-btn primary" href="${ppgUrl}" target="_blank">Search Pop Price Guide ↗</a>
        </div>
      </div>

      <div class="site-card">
        <div class="site-header">
          <span class="site-name">PriceCharting <span class="site-badge warn">Graded prices too</span></span>
        </div>
        <div class="site-desc">Tracks prices per condition — mint in box, near mint, loose. Good if you're looking at a graded Pop or want to compare boxed vs unboxed value.</div>
        <div class="site-footer">
          <a class="open-btn" href="${priceChartUrl}" target="_blank">Search PriceCharting ↗</a>
        </div>
      </div>

      <div class="site-card">
        <div class="site-header">
          <span class="site-name">Whatnot</span>
        </div>
        <div class="site-desc">Live auction platform popular with Funko collectors. Useful for seeing real-time demand and what buyers are currently bidding.</div>
        <div class="site-footer">
          <a class="open-btn" href="${whatnotUrl}" target="_blank">Search Whatnot ↗</a>
        </div>
      </div>

      <div class="tip-box">
        <strong>How to read eBay sold listings:</strong> Look at the most recent 5–10 sales and ignore outliers. A £5 sale and a £50 sale for the same Pop usually means condition or variant differences. The middle cluster of prices is your real market value.
      </div>

    </div>`;
}

document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
